name: Python Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      DB_URL: sqlite://
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build --target test -t task-planer:test .

      - name: Run tests
        run: |
          docker run --rm -e SECRET_KEY="$SECRET_KEY" -e DB_URL="$DB_URL" task-planer:test
