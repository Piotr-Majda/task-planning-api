name: Python Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build test image
        run: docker build --target test -t task-planer:test .
      
      - name: Run tests
        run: docker run task-planer:test