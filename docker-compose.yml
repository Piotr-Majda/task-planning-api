services:
  db:
    image: postgres:18
    container_name: postgres-dev
    environment:
      POSTGRES_PASSWORD: ${db_password}
      POSTGRES_USER: ${db_user}
      POSTGRES_DB: ${db_name}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${db_user} -d ${db_name}"]
      interval: 5s
      timeout: 5s
      retries: 5

  seed:
    image: task-planning
    build:
      target: dev
      context: .
    environment:
      db_url: postgresql+psycopg2://${db_user}:${db_password}@db:5432/${db_name}
      secret_key: ${secret_key}
    depends_on:
      db:
        condition: service_healthy
    command: python -m scripts.seed
    restart: "no"

  api:
    image: task-planning
    build:
      target: dev
      context: .
    ports:
      - "8000:80"
    environment:
      db_url: postgresql+psycopg2://${db_user}:${db_password}@db:5432/${db_name}
      secret_key: ${secret_key}
    depends_on:
      seed:
        condition: service_completed_successfully

volumes:
  postgres_data: